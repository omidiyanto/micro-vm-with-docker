name: Build virtctl binary

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: virtctl
          key: lint

      - name: Check formatting
        working-directory: virtctl
        run: cargo fmt --all -- --check

      - name: Run clippy
        working-directory: virtctl
        run: cargo clippy --all-targets --locked -- -D warnings

  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: linux-x86_64
          - target: i686-unknown-linux-gnu
            arch: linux-i686

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install 32-bit toolchain
        if: matrix.target == 'i686-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: virtctl
          key: ${{ matrix.target }}

      - name: Build release binary
        working-directory: virtctl
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp virtctl/target/${{ matrix.target }}/release/virtctl dist/virtctl-${{ matrix.arch }}
          chmod +x dist/virtctl-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: virtctl-${{ matrix.arch }}
          path: dist/virtctl-${{ matrix.arch }}
          if-no-files-found: error

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: virtctl-*
          merge-multiple: true

      - name: Reset latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes --cleanup-tag --repo "${GITHUB_REPOSITORY}" || true

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: virtctl latest
          target_commitish: ${{ github.sha }}
          files: dist/virtctl-*
          fail_on_unmatched_files: true
          make_latest: true
