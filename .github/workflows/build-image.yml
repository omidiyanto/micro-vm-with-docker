name: Build image

on:
  workflow_dispatch:
    inputs:
      image:
        description: Image folder under images/ to build
        required: true
        type: choice
        default: ubuntu-noble
        options:
          - ubuntu-noble

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate image folder
        shell: bash
        run: |
          folder="${{ inputs.image }}"
          if [ ! -f "images/${folder}/Dockerfile" ]; then
            echo "::error::images/${folder}/Dockerfile not found"
            exit 1
          fi

      - name: Resolve image metadata
        shell: bash
        run: |
          folder="${{ inputs.image }}"
          distro="${folder%%-*}"
          codename="${folder#*-}"
          image_repo="ghcr.io/${GITHUB_REPOSITORY,,}/${distro}"
          echo "IMAGE_FOLDER=images/${folder}" >> "${GITHUB_ENV}"
          echo "IMAGE_REPO=${image_repo}" >> "${GITHUB_ENV}"
          echo "IMAGE_TAG=${codename}" >> "${GITHUB_ENV}"
          echo "CACHE_REF=${image_repo}:buildcache-${codename}" >> "${GITHUB_ENV}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.IMAGE_FOLDER }}
          file: ${{ env.IMAGE_FOLDER }}/Dockerfile
          push: true
          tags: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ env.CACHE_REF }}
          cache-to: type=registry,ref=${{ env.CACHE_REF }},mode=max
